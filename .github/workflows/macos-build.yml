name: macOS build

on:
  workflow_dispatch:
  push:
    paths:
      - "**"

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            arch: arm64
          - runner: macos-13
            target: x86_64-apple-darwin
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt
      - name: Build Python backend
        run: python build_mac_backend.py
      - name: Install Tauri dependencies
        working-directory: mac-ui
        run: npm install
      - name: Build app and DMG
        working-directory: mac-ui
        run: npx tauri build --target ${{ matrix.target }} --bundles app,dmg --config src-tauri/tauri.macos.conf.json
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: mac-ui/src-tauri/target/${{ matrix.target }}/release/bundle/**
